# OAuth 2.0 Authentication Example
dialogflow_cx_oauth:
  type: "dialogflow_cx_connector"
  class: "DialogflowCXConnector"
  module: "connectors.dialogflow_cx_connector"
  config:
    project_id: "my-project"
    agent_id: "my-agent-id"
    location: "global"
    language_code: "en-US"
    sample_rate_hertz: 8000
    audio_encoding: "AUDIO_ENCODING_MULAW"

    # OAuth 2.0 credentials (user authentication)
    oauth_client_id: "YOUR_CLIENT_ID.apps.googleusercontent.com"
    oauth_client_secret: "YOUR_OAUTH_CLIENT_SECRET"
    oauth_token_file: "dialogflow_oauth_token.pickle"

    agents:
      - "OAuth Authenticated Agent"
# Notes:
# 1. Authentication Options (Priority Order):
#
#    - Option 1: Service Account Key File (development/testing)
#      Set service_account_key to path of JSON key file
#      Example: service_account_key: "/path/to/key.json"
#
#    - Option 2: OAuth 2.0 User Credentials (user-based access)
#      Set oauth_client_id, oauth_client_secret, and optionally oauth_token_file
#      First run will open browser for authorization
#      Token is cached for subsequent runs
#      Example:
#        oauth_client_id: "YOUR_ID.apps.googleusercontent.com"
#        oauth_client_secret: "YOUR_SECRET"
#        oauth_token_file: "oauth_token.pickle"
#
#    - Option 3: Application Default Credentials/ADC (recommended for production)
#      Don't set any auth parameters, instead:
#      - On GCP (Compute Engine, GKE, Cloud Run): Automatically uses attached service account
#      - Locally: Use 'gcloud auth application-default login'
#      - Docker/K8s: Mount credentials or use workload identity
#      - Environment variable: Set GOOGLE_APPLICATION_CREDENTIALS=/path/to/key.json
#
# 2. Setting Up OAuth 2.0:
#    a. Go to Google Cloud Console > APIs & Services > Credentials
#    b. Create OAuth 2.0 Client ID (Application type: Desktop app)
#    c. Download the client configuration
#    d. Extract client_id and client_secret
#    e. Add them to your config
#    f. First run will prompt for authorization (opens browser)
#    g. Subsequent runs use cached token from oauth_token_file
#
# 3. Audio Settings:
#    - WxCC uses 8000 Hz, 8-bit μ-law encoding
#    - Make sure your Dialogflow CX agent is configured for telephony
#    - Enable "Audio Export" in your agent settings if you need audio responses
#
# 4. Security Best Practices:
#    - Never commit service account keys or OAuth secrets to version control
#    - Use environment variables or secret management for sensitive data
#    - Grant minimal required permissions to service accounts
#    - Rotate keys regularly
#    - Add *.pickle files to .gitignore (OAuth tokens)
#
# 5. Required IAM Roles:
#    Your service account or OAuth user needs these roles:
#    - roles/dialogflow.client (or roles/dialogflow.admin)
#    - roles/dialogflow.reader
#
# 6. Testing Your Configuration:
#    - Test your agent in Dialogflow CX console first
#    - Verify your service account has proper permissions
#    - Check that your agent is published and has flows configured
#    - Monitor logs for connection issues

