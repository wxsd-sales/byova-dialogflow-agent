# Example Google Dialogflow CX Connector Configuration
# Copy this configuration and add it to your config/config.yaml file

dialogflow_cx_connector:
  type: "dialogflow_cx_connector"
  class: "DialogflowCXConnector"
  module: "connectors.dialogflow_cx_connector"
  config:
    # Required: Google Cloud project ID
    project_id: "YOUR_PROJECT_ID"

    # Required: Dialogflow CX agent ID
    # You can find this in the Dialogflow CX console under Agent Settings
    agent_id: "YOUR_AGENT_ID"

    # Required: Location where your agent is hosted
    # Common values: 'global', 'us-central1', 'europe-west1', 'asia-northeast1'
    location: "global"

    # Optional: Path to service account JSON key file
    # If not specified, will use Application Default Credentials (ADC) or OAuth
    # For production, use ADC or secret management instead of a file path
    service_account_key: "path/to/your-service-account-key.json"

    # Alternative: OAuth 2.0 User Credentials
    # Use this if you want to authenticate as a user instead of a service account
    # oauth_client_id: "YOUR_CLIENT_ID.apps.googleusercontent.com"
    # oauth_client_secret: "YOUR_CLIENT_SECRET"
    # oauth_token_file: "oauth_token.pickle"  # Where to store the OAuth token

    # Optional: Language code for conversations
    # Default: 'en-US'
    # See: https://cloud.google.com/dialogflow/cx/docs/reference/language
    language_code: "en-US"

    # Optional: Audio sample rate in Hertz
    # Default: 8000
    # WxCC typically uses 8000 Hz for telephony
    sample_rate_hertz: 8000

    # Optional: Audio encoding format
    # Default: 'AUDIO_ENCODING_MULAW'
    # Options: AUDIO_ENCODING_LINEAR_16, AUDIO_ENCODING_MULAW, AUDIO_ENCODING_FLAC, etc.
    # WxCC typically uses MULAW encoding
    audio_encoding: "AUDIO_ENCODING_MULAW"

    # Optional: List of agent display names for WxCC
    # These are the agent IDs that will appear in the ListVirtualAgents response
    agents:
      - "Dialogflow CX Agent"
      - "My Customer Service Bot"

# Example configurations for different environments:

# Development/Testing
dialogflow_cx_dev:
  type: "dialogflow_cx_connector"
  class: "DialogflowCXConnector"
  module: "connectors.dialogflow_cx_connector"
  config:
    project_id: "my-dev-project"
    agent_id: "abc123-dev-agent"
    location: "us-central1"
    language_code: "en-US"
    sample_rate_hertz: 8000
    audio_encoding: "AUDIO_ENCODING_MULAW"
    # Using ADC in development (no service_account_key specified)
    agents:
      - "Dev Agent"

