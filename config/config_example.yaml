# Webex Contact Center BYOVA Gateway Configuration

# Gateway settings
gateway:
  host: "0.0.0.0"
  port: 50051

# Connectors configuration
connectors:
  # Local Audio Connector
  # local_audio_connector:
  #   type: "local_audio_connector"
  #   class: "LocalAudioConnector"
  #   module: "connectors.local_audio_connector"
  #   config:
  #     audio_files:
  #       welcome: "welcome.wav"
  #       transfer: "transferring.wav"
  #       goodbye: "goodbye.wav"
  #       error: "error.wav"
  #       default: "default_response.wav"
  #     agents:
  #       - "Local Playback"

  my_connector:
    type: "my_connector"
    class: "MyConnector"
    module: "connectors.my_connector"
    config:
      agents:
        - "My Agent"

  # Google Dialogflow CX Connector
  dialogflow_cx_connector:
    type: "dialogflow_cx_connector"
    class: "DialogflowCXConnector"
    module: "connectors.dialogflow_cx_connector"
    config:
      project_id: "<PROJECT_ID>"
      agent_id: "<AGENT_ID>"
      location: "global"
      language_code: "en-US"
      sample_rate_hertz: 16000 # Recommended: 16000 for best quality
      audio_encoding: "AUDIO_ENCODING_LINEAR_16"
      force_input_format: "wxcc"
      min_audio_seconds: 2.5
      max_audio_seconds: 5.0
      agents:
        - "Dialogflow CX Agent"

  dialogflow_cx_oauth:
    type: "dialogflow_cx_connector"
    class: "DialogflowCXConnector"
    module: "connectors.dialogflow_cx_connector"
    config:
      project_id: "<PROJET_ID>"
      agent_id: "<AGENT_ID>"
      location: "global"
      language_code: "en-US"
      sample_rate_hertz: 16000 # Recommended: 16000 for best quality
      audio_encoding: "AUDIO_ENCODING_LINEAR_16"
      force_input_format: "wxcc"

      # OAuth 2.0 credentials (user authentication)
      oauth_client_id: "<CLIENT_ID>"
      oauth_client_secret: "<CLIENT_SECRET>"
      oauth_token_file: "dialogflow_oauth_token.pickle"

    agents:
      - "OAuth Authenticated Agent"

# Monitoring interface
monitoring:
  enabled: true
  host: "0.0.0.0"
  port: 8080
  metrics_enabled: true
  health_check_interval: 30

# Logging configuration
logging:
  gateway:
    level: "INFO"
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    file: "logs/gateway.log"
    max_size: "10MB"
    backup_count: 5

  web:
    level: "WARNING"
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    file: "logs/web.log"
    max_size: "5MB"
    backup_count: 3

# Session management
sessions:
  timeout: 600
  max_sessions: 1000
  cleanup_interval: 60
  enable_auto_cleanup: true
  max_session_duration: 3600

# Audio processing
audio:
  supported_formats:
    - "wav"
    - "mp3"
    - "flac"
    - "ogg"
