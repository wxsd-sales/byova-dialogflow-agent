# Webex Contact Center BYOVA Gateway — example configuration
# Replace placeholders with your project and agent IDs. Do not commit real secrets.

gateway:
  host: "0.0.0.0"
  port: 50051
  # Optional: TLS in-process, or terminate TLS at a load balancer / reverse proxy
  # tls:
  #   enabled: true
  #   server_cert_chain_file: "config/certs/server-chain.pem"
  #   server_private_key_file: "config/certs/server-key.pem"

connectors:
  dialogflow_cx_connector:
    type: "dialogflow_cx_connector"
    class: "DialogflowCXConnector"
    module: "connectors.dialogflow_cx_connector"
    config:
      project_id: "YOUR_GCP_PROJECT_ID"
      agent_id: "YOUR_DIALOGFLOW_CX_AGENT_ID"
      location: "global"
      language_code: "en-US"
      sample_rate_hertz: 16000
      audio_encoding: "AUDIO_ENCODING_LINEAR_16"
      force_input_format: "wxcc"
      agents:
        - "Dialogflow CX Agent"

  # Google CX Agent Studio (GECX / CES BidiRunSession)
  # gecx_connector:
  #   type: "gecx_connector"
  #   class: "GECXConnector"
  #   module: "connectors.gecx_connector"
  #   config:
  #     project_id: "YOUR_PROJECT_ID"
  #     location: "us"
  #     application_id: "YOUR_APP_ID"
  #     # deployment_id is OPTIONAL; omit to use the app's root/draft agent.
  #     # deployment_id: "YOUR_DEPLOYMENT_ID"
  #     # api_endpoint defaults to ces.<location>.rep.googleapis.com (regional
  #     # runtime endpoint that serves BidiRunSession); override only if needed.
  #     language_code: "en-US"
  #     input_sample_rate_hertz: 8000
  #     input_audio_encoding: "MULAW"
  #     output_sample_rate_hertz: 8000
  #     output_audio_encoding: "MULAW"
  #     initial_message: "Hello"
  #     enable_partial_responses: true
  #     force_input_format: "wxcc"
  #     # Omit auth to use Application Default Credentials (recommended on GCP;
  #     # runtime service account needs role roles/ces.client).
  #     # service_account_key: "/path/to/service-account.json"
  #     agents:
  #       - "My GECX Agent"

# Monitoring interface
monitoring:
  enabled: true
  host: "0.0.0.0"
  port: 8080
  metrics_enabled: true
  health_check_interval: 30

logging:
  gateway:
    level: "INFO"
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    file: "logs/gateway.log"
    max_size: "10MB"
    backup_count: 5
  web:
    level: "WARNING"
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    file: "logs/web.log"
    max_size: "5MB"
    backup_count: 3

sessions:
  timeout: 600
  max_sessions: 1000
  cleanup_interval: 60
  enable_auto_cleanup: true
  max_session_duration: 3600

audio:
  supported_formats:
    - "wav"
    - "mp3"
    - "flac"
    - "ogg"
