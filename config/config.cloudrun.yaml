# Cloud Run deployment configuration for the BYOVA Gateway.
#
# This config is selected at runtime via the GATEWAY_CONFIG env var. It connects
# to the Google CX Agent Studio (CES) "Hotel Agent" via the gecx_connector.
#
# Authentication: no key file is set, so the connector uses Application Default
# Credentials -- on Cloud Run that is the service's runtime service account,
# which must have permission to run CES sessions (ces.sessions.bidiRunSession).
#
# Notes for Cloud Run:
# - The listen port is taken from the $PORT env var (injected by Cloud Run),
#   so the gateway.port below is only a local fallback.
# - Monitoring is disabled because Cloud Run exposes a single port, which is
#   used for the WxCC gRPC endpoint.

gateway:
  host: "0.0.0.0"
  port: 50051

connectors:
  gecx_connector:
    type: "gecx_connector"
    class: "GECXConnector"
    module: "connectors.gecx_connector"
    config:
      project_id: "new-project-wxsd"
      location: "us"
      application_id: "193ffd20-c870-4732-bc4b-a2e32ee4a083"
      # Pinned to the published deployment. Remove this line to fall back to the
      # app's root/draft agent. The regional CES endpoint
      # (ces.us.rep.googleapis.com) is auto-derived from location.
      deployment_id: "8cb5bf59-e46a-4c62-8228-d1bf92800dca"
      language_code: "en-US"
      input_sample_rate_hertz: 8000
      input_audio_encoding: "MULAW"
      output_sample_rate_hertz: 8000
      output_audio_encoding: "MULAW"
      initial_message: "Hello"
      enable_partial_responses: true
      force_input_format: "wxcc"
      agents:
        - "Hotel Agent"

# Single port on Cloud Run is reserved for the gRPC endpoint.
monitoring:
  enabled: false

logging:
  gateway:
    level: "INFO"
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    # Empty file => stdout only (Cloud Run captures stdout in Cloud Logging).
    file: ""

  web:
    level: "WARNING"
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    file: ""

sessions:
  timeout: 600
  max_sessions: 1000
  cleanup_interval: 60
  enable_auto_cleanup: true
  max_session_duration: 3600

audio:
  supported_formats:
    - "wav"
    - "mp3"
    - "flac"
    - "ogg"
