// Standard gRPC health-checking protocol.
// Source: https://github.com/grpc/grpc/blob/master/src/proto/grpc/health/v1/health.proto
//
// Webex Contact Center / BYODS uses this service to verify the datasource is
// healthy before routing calls. The gateway registers a HealthServicer that
// reports SERVING when at least one virtual agent is available.
syntax = "proto3";

package grpc.health.v1;

message HealthCheckRequest {
  string service = 1;
}

message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
    SERVICE_UNKNOWN = 3;  // Used only by the Watch method.
  }
  ServingStatus status = 1;
}

service Health {
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse);

  rpc Watch(HealthCheckRequest) returns (stream HealthCheckResponse);
}
